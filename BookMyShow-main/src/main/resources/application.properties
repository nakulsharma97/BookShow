spring.application.name=bms
spring.datasource.url=jdbc:mysql://localhost:3306/bms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=12345
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true
server.port=8080

# JWT Secret Key (CHANGE THIS IN PRODUCTION!)
app.jwtSecret=YourSuperSecretKeyForJWTGenerationAndValidation1234567890
app.jwtExpirationMs=86400000

# CORS Configuration for React Frontend
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600
server.port=8080
